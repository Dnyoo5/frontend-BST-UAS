<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventori Stok Barang — BST</title>

    <!-- Tailwind via CDN — cukup untuk demo, production sebaiknya build step -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind config: extend warna brand -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: "#78350f", // amber-900
                            light: "#fef3c7", // amber-100
                            mid: "#d97706", // amber-600
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Transisi halus untuk baris tabel yang muncul */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
            }
        }

        /* Loader spinner */
        .spinner {
            border: 3px solid #e5e7eb;
            border-top-color: #d97706;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-amber-50 min-h-screen font-sans text-gray-800">

    <!-- HEADER -->
    <header class="bg-brand text-white py-5 px-6 shadow-md">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Inventori Stok Barang</h1>
                <p class="text-amber-200 text-sm mt-0.5">Struktur Data: Binary Search Tree (BST) · Python</p>
            </div>
            <!-- Total nilai inventori -->
            <div class="text-right">
                <p class="text-xs text-amber-300 uppercase tracking-widest">Total Nilai</p>
                <p id="total-nilai" class="text-xl font-bold">Rp —</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 space-y-8">

        <!-- FORM TAMBAH PRODUK -->
        <section class="bg-white rounded-2xl shadow p-6">
            <h2 class="font-semibold text-brand text-lg mb-4">Tambah Produk Baru</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <input id="inp-kode" type="text" placeholder="Kode (P005)"
                    class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-mid" />
                <input id="inp-nama" type="text" placeholder="Nama Produk"
                    class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-mid" />
                <input id="inp-harga" type="number" placeholder="Harga (Rp)" min="1"
                    class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-mid" />
                <input id="inp-stok" type="number" placeholder="Stok" min="0"
                    class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-mid" />
            </div>
            <button onclick="tambahProduk()" class="mt-4 bg-brand text-white px-5 py-2 rounded-lg text-sm font-medium
                     hover:bg-amber-800 active:scale-95 transition-all">
                + Tambah Produk
            </button>
            <p id="msg-tambah" class="mt-2 text-sm hidden"></p>
        </section>

        <!-- SEARCH -->
        <section class="bg-white rounded-2xl shadow p-6">
            <h2 class="font-semibold text-brand text-lg mb-4">Cari Produk</h2>
            <div class="flex gap-3">
                <input id="inp-cari" type="text" placeholder="Nama produk..."
                    class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-mid"
                    onkeydown="if(event.key==='Enter') cariProduk()" />
                <button onclick="cariProduk()"
                    class="bg-brand-mid text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-amber-700 transition-all">
                    Cari
                </button>
            </div>
            <!-- Hasil search ditampilkan di sini -->
            <div id="hasil-cari" class="mt-3 hidden bg-amber-50 rounded-xl p-4 text-sm"></div>
        </section>

        <!-- TABEL PRODUK -->
        <section class="bg-white rounded-2xl shadow p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-semibold text-brand text-lg">Daftar Produk (Inorder BST)</h2>
                <button onclick="loadProduk()" class="text-xs text-brand-mid underline hover:text-brand">↻
                    Refresh</button>
            </div>

            <!-- Loading state -->
            <div id="loader" class="flex justify-center py-8">
                <div class="spinner"></div>
            </div>

            <!-- Tabel -->
            <div id="tabel-wrapper" class="hidden overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-brand text-white text-left">
                            <th class="px-4 py-3 rounded-tl-lg">Kode</th>
                            <th class="px-4 py-3">Nama</th>
                            <th class="px-4 py-3">Harga</th>
                            <th class="px-4 py-3">Stok</th>
                            <th class="px-4 py-3">Status</th>
                            <th class="px-4 py-3 rounded-tr-lg">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>

            <!-- Empty state -->
            <div id="empty-state" class="hidden text-center py-10 text-gray-400 text-sm">
                Belum ada produk. Tambahkan produk di atas.
            </div>
        </section>

    </main>

    <!-- Toast notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white text-sm px-4 py-3 rounded-xl shadow-lg
              opacity-0 transition-opacity duration-300 pointer-events-none max-w-xs">
    </div>

    <script src="app.js"></script>
</body>

</html>
